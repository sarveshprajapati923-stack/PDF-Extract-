<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convert PDF to Word - WePDFHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .upload-box { transition: all 0.3s; }
    .upload-box:hover { border-color: #ef4444; background: #fef2f2; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-2xl mx-auto py-8 px-4">
    
    <h1 class="text-3xl font-bold text-center mb-2">Convert PDF to Word</h1>
    <p class="text-center text-gray-600 mb-8">Fast, secure and easy PDF to DOCX conversion</p>

    <!-- Upload Area -->
    <div id="uploadArea" class="upload-box border-2 border-dashed border-gray-300 rounded-3xl p-12 text-center cursor-pointer hover:border-red-500">
      <i class="fa-solid fa-cloud-arrow-up text-6xl text-red-500 mb-4"></i>
      <p class="text-xl font-semibold">Drop your PDF file here</p>
      <p class="text-gray-500">or</p>
      <button onclick="document.getElementById('fileInput').click()" 
              class="mt-4 px-6 py-3 bg-red-600 text-white rounded-xl font-medium hover:bg-red-700">
        Select PDF File
      </button>
      <input type="file" id="fileInput" accept="application/pdf" class="hidden">
      <p class="text-xs text-gray-400 mt-4">PDF files only • Max 50MB</p>
    </div>

    <!-- File Info & Preview (will show after upload) -->
    <div id="fileInfo" class="hidden mt-6">
      <!-- Dynamic content JS se aayega -->
    </div>

  </div>

  <script>
    // Simple JS for demo (baad mein backend connect kar lena)
    document.getElementById('fileInput').addEventListener('change', function(e) {
      if (e.target.files[0]) {
        alert("File selected: " + e.target.files[0].name + "\n\nAbhi backend connect karna baaki hai.");
      }
    });
  </script>

</body>
</html>
