<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convert PDF to Word - WePDFHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-2xl mx-auto pt-10 px-4">

    <h1 class="text-4xl font-bold text-center text-gray-900 mb-2">Convert PDF to Word</h1>
    <p class="text-center text-gray-600 mb-12">Fast, clean, and high-quality conversion</p>

    <!-- Upload Area -->
    <div id="uploadArea" class="border-2 border-dashed border-gray-300 rounded-3xl p-16 text-center cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-all">
      <i class="fa-solid fa-cloud-arrow-up text-7xl text-blue-500 mb-6"></i>
      <p class="text-2xl font-semibold text-gray-800">Drop your PDF file here</p>
      <p class="text-gray-500 mt-3">or click to upload</p>
      
      <button onclick="document.getElementById('fileInput').click()" 
              class="mt-8 px-10 py-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-2xl text-lg shadow-md">
        Select PDF File
      </button>
      
      <input type="file" id="fileInput" accept="application/pdf" class="hidden">
      <p class="text-sm text-gray-400 mt-8">PDF only • Max 50MB</p>
    </div>

    <!-- File Info Area -->
    <div id="fileInfo" class="hidden mt-8 bg-white rounded-3xl shadow p-8">
      <div class="flex items-center gap-4">
        <div class="w-14 h-20 bg-red-100 rounded flex items-center justify-center text-3xl">📄</div>
        <div class="flex-1 min-w-0">
          <p class="font-medium truncate" id="fileName">filename.pdf</p>
          <p class="text-sm text-gray-500" id="fileSize">0 MB</p>
        </div>
        <button onclick="removeFile()" class="text-red-500 hover:text-red-600 font-medium">Remove</button>
      </div>

      <button onclick="startConversion()" 
              class="w-full mt-10 py-5 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-xl rounded-2xl shadow">
        Convert to Word
      </button>
    </div>

  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInfo = document.getElementById('fileInfo');
    const fileInput = document.getElementById('fileInput');

    fileInput.addEventListener('change', function(e) {
      if (e.target.files[0]) {
        const file = e.target.files[0];
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileSize').textContent = (file.size / (1024*1024)).toFixed(2) + " MB";
        
        uploadArea.classList.add('hidden');
        fileInfo.classList.remove('hidden');
      }
    });

    function removeFile() {
      uploadArea.classList.remove('hidden');
      fileInfo.classList.add('hidden');
      fileInput.value = '';
    }

    function startConversion() {
      alert("✅ File conversion started!\n\n(Backend integration abhi baaki hai)");
    }
  </script>

</body>
</html>
