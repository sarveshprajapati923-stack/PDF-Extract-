<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>PDF to Word • WePDFHub</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
  .drop-active {
    border-color:#2563eb;
    background:#eff6ff;
  }
</style>
</head>

<body class="bg-gray-50">

<div class="max-w-2xl mx-auto p-4">

  <!-- HEADER -->
  <h1 class="text-3xl font-bold text-center mt-6">
    Convert PDF to Word
  </h1>
  <p class="text-center text-gray-500 mb-6">
    Fast, clean & secure conversion
  </p>

  <!-- UPLOAD BOX -->
  <div id="dropZone"
    class="border-2 border-dashed border-gray-300 rounded-2xl p-10 text-center cursor-pointer transition">

    <div class="text-5xl mb-4">☁️</div>

    <p class="font-semibold text-lg">
      Drop your PDF here
    </p>
    <p class="text-gray-500 mb-4">
      or click to upload
    </p>

    <button class="bg-blue-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-blue-700 active:scale-95 transition">
      Select PDF File
    </button>

    <input id="fileInput" type="file" accept="application/pdf" hidden />

    <p class="text-sm text-gray-400 mt-3">
      PDF only • Max 50MB
    </p>
  </div>

  <!-- FILE CARD -->
  <div id="fileCard" class="hidden mt-6 bg-white p-4 rounded-xl shadow">

    <div class="flex justify-between items-center">
      <div>
        <p id="fileName" class="font-semibold"></p>
        <p id="fileSize" class="text-sm text-gray-500"></p>
      </div>
      <button id="removeBtn" class="text-red-500 text-sm">Remove</button>
    </div>

    <!-- PREVIEW -->
    <canvas id="pdfPreview" class="mt-4 w-full rounded border"></canvas>
  </div>

  <!-- OPTIONS -->
  <div id="optionsBox" class="hidden mt-6">
    <label class="font-medium">Page Range</label>
    <select id="pageOption" class="w-full border rounded-lg p-2 mt-2">
      <option value="all">All Pages</option>
      <option value="custom">Custom</option>
    </select>

    <input id="customRange" placeholder="e.g. 1-5"
      class="w-full border rounded-lg p-2 mt-2 hidden" />
  </div>

  <!-- CONVERT BUTTON -->
  <button id="convertBtn"
    class="hidden w-full bg-blue-600 text-white py-3 mt-6 rounded-xl font-semibold hover:bg-blue-700 active:scale-95 transition">
    Convert to Word
  </button>

  <!-- PROGRESS -->
  <div id="progressBox" class="hidden mt-6">
    <div class="w-full bg-gray-200 rounded-full h-4">
      <div id="progressBar" class="bg-blue-600 h-4 rounded-full" style="width:0%"></div>
    </div>
    <p id="progressText" class="text-center mt-2 text-sm">0%</p>
  </div>

  <!-- SUCCESS -->
  <div id="successBox" class="hidden mt-6 text-center">
    <p class="text-green-600 font-semibold text-lg mb-3">
      ✅ Conversion Completed
    </p>

    <a id="downloadBtn"
      class="block bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition">
      Download Word File
    </a>

    <button id="resetBtn"
      class="mt-3 border px-4 py-2 rounded-lg">
      Convert Another File
    </button>
  </div>

</div>

<script>
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");

const fileCard = document.getElementById("fileCard");
const fileName = document.getElementById("fileName");
const fileSize = document.getElementById("fileSize");

const convertBtn = document.getElementById("convertBtn");
const progressBox = document.getElementById("progressBox");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");

const successBox = document.getElementById("successBox");
const downloadBtn = document.getElementById("downloadBtn");

const removeBtn = document.getElementById("removeBtn");
const resetBtn = document.getElementById("resetBtn");

const optionsBox = document.getElementById("optionsBox");
const pageOption = document.getElementById("pageOption");
const customRange = document.getElementById("customRange");

let selectedFile = null;

/* CLICK */
dropZone.onclick = () => fileInput.click();

/* FILE SELECT */
fileInput.onchange = () => {
  handleFile(fileInput.files[0]);
};

/* DRAG */
dropZone.ondragover = (e) => {
  e.preventDefault();
  dropZone.classList.add("drop-active");
};

dropZone.ondragleave = () => {
  dropZone.classList.remove("drop-active");
};

dropZone.ondrop = (e) => {
  e.preventDefault();
  dropZone.classList.remove("drop-active");
  handleFile(e.dataTransfer.files[0]);
};

/* HANDLE FILE */
function handleFile(file) {
  if (!file || file.type !== "application/pdf") {
    alert("Only PDF allowed");
    return;
  }

  selectedFile = file;

  fileCard.classList.remove("hidden");
  convertBtn.classList.remove("hidden");
  optionsBox.classList.remove("hidden");

  fileName.textContent = file.name;
  fileSize.textContent = (file.size/1024/1024).toFixed(2) + " MB";

  previewPDF(file);
}

/* PDF PREVIEW */
function previewPDF(file) {
  const reader = new FileReader();

  reader.onload = function() {
    const typedarray = new Uint8Array(this.result);

    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
      pdf.getPage(1).then(page => {
        const canvas = document.getElementById("pdfPreview");
        const ctx = canvas.getContext("2d");

        const viewport = page.getViewport({scale:1});
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        page.render({canvasContext:ctx, viewport});
      });
    });
  };

  reader.readAsArrayBuffer(file);
}

/* OPTIONS */
pageOption.onchange = () => {
  customRange.classList.toggle("hidden", pageOption.value !== "custom");
};

/* REMOVE */
removeBtn.onclick = () => location.reload();
resetBtn.onclick = () => location.reload();

/* CONVERT */
convertBtn.onclick = () => {
  if (!selectedFile) return;

  progressBox.classList.remove("hidden");

  const formData = new FormData();
  formData.append("file", selectedFile);
  formData.append("range", pageOption.value === "custom" ? customRange.value : "all");

  const xhr = new XMLHttpRequest();
  xhr.open("POST", "/api/pdf-to-word");
  xhr.responseType = "blob";

  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      let percent = Math.round((e.loaded / e.total) * 100);
      progressBar.style.width = percent + "%";
      progressText.textContent = percent + "%";
    }
  };

  xhr.onload = () => {
    if (xhr.status !== 200) {
      alert("Conversion failed");
      return;
    }

    const blob = xhr.response;
    const url = URL.createObjectURL(blob);

    progressBox.classList.add("hidden");
    successBox.classList.remove("hidden");

    downloadBtn.href = url;
    downloadBtn.download =
      xhr.getResponseHeader("x-filename") || "converted.docx";
  };

  xhr.send(formData);
};
</script>

</body>
</html>
