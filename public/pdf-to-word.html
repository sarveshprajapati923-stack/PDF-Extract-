<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convert PDF to Word</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<style>
  .dropzone:hover {
    box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
  }
</style>
</head>

<body class="bg-white">

<div class="min-h-screen flex flex-col items-center justify-center px-4">

  <!-- Title -->
  <h1 class="text-3xl font-bold mb-2">Convert PDF to Word</h1>
  <p class="text-gray-500 mb-8 text-center">Fast, clean & secure conversion</p>

  <!-- Upload Box -->
  <div id="dropzone"
    class="dropzone border-2 border-dashed border-gray-300 rounded-xl p-10 text-center w-full max-w-xl cursor-pointer transition">

    <div class="text-5xl mb-3">📄</div>
    <p class="font-medium">Drop your PDF here</p>
    <p class="text-sm text-gray-400 mb-3">or click to upload</p>

    <button class="bg-red-500 text-white px-5 py-2 rounded-lg">
      Select PDF File
    </button>

    <input id="fileInput" type="file" accept="application/pdf" hidden>
  </div>

  <!-- File Info -->
  <div id="fileBox" class="hidden mt-6 w-full max-w-xl">
    <div class="flex justify-between items-center bg-gray-100 p-3 rounded-lg">
      <div>
        <p id="fileName" class="font-medium"></p>
        <p id="fileSize" class="text-sm text-gray-500"></p>
      </div>
      <button onclick="removeFile()" class="text-red-500">Remove</button>
    </div>
  </div>

  <!-- Preview -->
  <canvas id="preview" class="hidden mt-4 border rounded"></canvas>

  <!-- Options -->
  <div id="options" class="hidden mt-4 w-full max-w-xl">
    <label class="text-sm">Page Range</label>
    <select id="range" class="border p-2 rounded w-full mt-1">
      <option value="all">All Pages</option>
      <option value="custom">Custom</option>
    </select>
    <input id="customRange" placeholder="e.g. 1-5"
      class="border p-2 rounded w-full mt-2 hidden">
  </div>

  <!-- Convert Button -->
  <button id="convertBtn"
    class="hidden mt-4 bg-red-500 text-white px-6 py-3 rounded-lg w-full max-w-xl">
    Convert to Word
  </button>

  <!-- Progress -->
  <div id="progressBox" class="hidden mt-4 w-full max-w-xl">
    <div class="w-full bg-gray-200 rounded-full h-3">
      <div id="bar" class="bg-red-500 h-3 rounded-full" style="width:0%"></div>
    </div>
    <p id="percent" class="text-center text-sm mt-1">0%</p>
  </div>

  <!-- Success -->
  <div id="successBox" class="hidden text-center mt-6">
    <p class="text-green-600 text-lg font-semibold mb-3">✅ Conversion Completed</p>

    <a id="downloadBtn"
      class="bg-red-500 text-white px-6 py-3 rounded-lg block mb-3">
      Download Word File
    </a>

    <button onclick="resetAll()" class="text-gray-600">
      Convert Another File
    </button>
  </div>

</div>

<script>
let file = null;

// click upload
document.getElementById("dropzone").onclick = () => {
  document.getElementById("fileInput").click();
};

// file select
document.getElementById("fileInput").onchange = (e) => {
  file = e.target.files[0];
  if (!file) return;

  document.getElementById("fileBox").classList.remove("hidden");
  document.getElementById("fileName").innerText = file.name;
  document.getElementById("fileSize").innerText =
    (file.size / 1024 / 1024).toFixed(2) + " MB";

  document.getElementById("convertBtn").classList.remove("hidden");
  document.getElementById("options").classList.remove("hidden");

  showPreview(file);
};

// remove
function removeFile() {
  file = null;
  resetAll();
}

// preview PDF
function showPreview(file) {
  const reader = new FileReader();
  reader.onload = function () {
    const typedarray = new Uint8Array(this.result);

    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
      pdf.getPage(1).then(page => {
        const canvas = document.getElementById("preview");
        const context = canvas.getContext("2d");

        const viewport = page.getViewport({ scale: 1 });
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        page.render({ canvasContext: context, viewport: viewport });

        canvas.classList.remove("hidden");
      });
    });
  };
  reader.readAsArrayBuffer(file);
}

// custom range toggle
document.getElementById("range").onchange = (e) => {
  document.getElementById("customRange").classList.toggle(
    "hidden",
    e.target.value !== "custom"
  );
};

// convert
document.getElementById("convertBtn").onclick = () => {
  if (!file) return alert("Select file");

  const formData = new FormData();
  formData.append("file", file);

  const xhr = new XMLHttpRequest();
  xhr.open("POST", "/api/pdf-to-word");
  xhr.responseType = "blob";

  document.getElementById("progressBox").classList.remove("hidden");

  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      let p = Math.round((e.loaded / e.total) * 100);
      document.getElementById("bar").style.width = p + "%";
      document.getElementById("percent").innerText = p + "%";
    }
  };

  xhr.onload = () => {
    if (xhr.status !== 200) return alert("Error");

    const url = URL.createObjectURL(xhr.response);

    const btn = document.getElementById("downloadBtn");
    btn.href = url;
    btn.download = "converted.docx";

    document.getElementById("successBox").classList.remove("hidden");
  };

  xhr.send(formData);
};

// reset
function resetAll() {
  document.getElementById("fileInput").value = "";
  document.getElementById("fileBox").classList.add("hidden");
  document.getElementById("preview").classList.add("hidden");
  document.getElementById("convertBtn").classList.add("hidden");
  document.getElementById("successBox").classList.add("hidden");
  document.getElementById("progressBox").classList.add("hidden");
  document.getElementById("options").classList.add("hidden");
}
</script>

</body>
</html>
