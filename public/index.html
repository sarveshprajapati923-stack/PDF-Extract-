<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Tools Pro</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff;text-align:center}
.container{padding:20px}
h1{font-size:28px;margin-bottom:10px}
.card{background:#1e293b;padding:20px;border-radius:16px;margin:10px}
button{padding:12px 20px;border-radius:10px;border:2px solid #38bdf8;background:transparent;color:#38bdf8;cursor:pointer;transition:.3s}
button:hover{background:#38bdf8;color:#000}
input{padding:10px;border-radius:10px;border:none;width:80%;margin-bottom:10px}
</style>
</head>
<body>
<div class="container">
<h1>PDF Tools Pro ðŸš€</h1>

<div class="card">
<h3>Upload PDF</h3>
<input type="file" id="file">
<br>
<button onclick="upload()">Upload</button>
</div>

<div class="card">
<h3>Convert to ZIP</h3>
<input type="file" id="zipfile">
<br>
<button onclick="zip()">Convert</button>
</div>

<p id="msg"></p>
</div>

<script>
async function upload(){
 let file=document.getElementById("file").files[0];
 let fd=new FormData();
 fd.append("file",file);
 let res=await fetch("/upload",{method:"POST",body:fd});
 let data=await res.json();
 document.getElementById("msg").innerHTML="Uploaded: "+data.file;
}

async function zip(){
 let file=document.getElementById("zipfile").files[0];
 let fd=new FormData();
 fd.append("file",file);
 let res=await fetch("/zip",{method:"POST",body:fd});
 let data=await res.json();
 document.getElementById("msg").innerHTML="ZIP: <a href='"+data.file+"' target='_blank'>Download</a>";
}
</script>
</body>
  </html>
