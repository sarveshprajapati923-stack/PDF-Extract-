<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WePDFHub - Smart PDF Tools</title>

<style>
:root{
  --bg:#f7f9ff;
  --panel:#ffffff;
  --line:#d8e2f0;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#2563eb;
  --primary2:#0ea5e9;
  --shadow:0 18px 50px rgba(15,23,42,.08);
}

*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--text)}
a{text-decoration:none;color:inherit}

body{
  padding-top:54px;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.menu-btn{
  position:fixed;
  top:12px;
  left:12px;
  z-index:10001;
  font-size:28px;
  cursor:pointer;
  width:44px;
  height:44px;
  display:grid;
  place-items:center;
  border-radius:12px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}

.backdrop{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.35);
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
  z-index:10000;
}

.backdrop.show{
  opacity:1;
  pointer-events:auto;
}

.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:240px;
  height:100%;
  background:#fff;
  border-right:1px solid var(--line);
  transition:.3s ease;
  padding:20px;
  z-index:10002;
  box-shadow:0 20px 50px rgba(0,0,0,.12);
}

.sidebar.open{
  left:0;
}

.sidebar h3{
  margin:0 0 14px;
  font-size:18px;
}

.sidebar a{
  display:block;
  padding:12px 10px;
  border-radius:10px;
  text-decoration:none;
  color:#0f172a;
  margin-bottom:4px;
}

.sidebar a:hover{
  background:#f3f6ff;
}

.hero{
  margin:0 0 14px;
  padding:18px 18px 14px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
}

.hero h1{
  margin:0 0 6px;
  font-size:clamp(1.25rem,2.8vw,1.9rem);
  line-height:1.15;
}

.hero p{
  margin:0;
  color:var(--muted);
  line-height:1.5;
}

.top-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
  align-items:center;
}

.search{
  flex:1;
  min-width:220px;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--line);
  outline:none;
  background:#fff;
}

.tabs{
  display:flex;
  gap:10px;
  overflow:auto;
  margin-bottom:10px;
  padding-bottom:2px;
}

.tabs button,
.filter-btn{
  padding:8px 14px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:20px;
  cursor:pointer;
  transition:.2s;
  white-space:nowrap;
}

.tabs button:hover,
.filter-btn:hover{
  transform:translateY(-1px);
}

.tabs button.active,
.filter-btn.active{
  background:var(--primary);
  color:#fff;
  border-color:transparent;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.tool-card{
  padding:16px;
  border-radius:16px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,#fff,#f8fbff);
  display:flex;
  gap:12px;
  text-decoration:none;
  color:inherit;
  transition:.2s;
  min-height:112px;
}

.tool-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.tool-ico{
  width:46px;
  height:46px;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:#eef4ff;
  font-weight:700;
  color:var(--primary);
  flex:0 0 46px;
  font-size:18px;
}

.tool-card h3{
  margin:0;
  font-size:16px;
}

.tool-card p{
  margin:4px 0 0;
  font-size:13px;
  color:var(--muted);
  line-height:1.45;
}

.small-note{
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
}

.empty-state{
  padding:18px;
  background:#fff;
  border:1px dashed var(--line);
  border-radius:16px;
  color:var(--muted);
}
</style>
</head>

<body>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div id="backdrop" class="backdrop" onclick="toggleMenu()"></div>

  <div id="sidebar" class="sidebar">
    <h3>WePDFHub</h3>
    <a href="/">All Tools</a>
    <a href="/merge-pdf">Merge PDF</a>
    <a href="/split-pdf">Split PDF</a>
    <a href="/protect-pdf">Protect PDF</a>
    <a href="/word-to-pdf">Word to PDF</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </div>

  <div class="wrap">
    <section class="hero">
      <h1>Every tool you need to work with PDFs in one place</h1>
      <p>Merge, split, compress, convert and protect PDFs with just a few clicks.</p>
    </section>

    <div class="tabs">
      <button class="active" data-cat="all">All</button>
      <button data-cat="edit">Organize PDF</button>
      <button data-cat="convert">Convert PDF</button>
      <button data-cat="security">Security</button>
      <button data-cat="ai">AI Tools</button>
    </div>

    <div class="top-bar">
      <input id="search" class="search" placeholder="Search tools..." />
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="edit">Edit</button>
      <button class="filter-btn" data-cat="convert">Convert</button>
      <button class="filter-btn" data-cat="security">Security</button>
    </div>

    <div id="grid" class="grid"></div>
  </div>

<script>
const icons = {
  "merge-pdf":"⚡",
  "split-pdf":"✂️",
  "compress-pdf":"🗜️",
  "rotate-pdf":"🔄",
  "watermark-pdf":"💧",
  "delete-pages":"🗑️",
  "extract-pages":"📤",
  "reorder-pages":"🔀",
  "reverse-pages":"↩️",
  "duplicate-pages":"📑",
  "crop-pdf":"✂️",
  "add-blank-pages":"➕",
  "page-number":"🔢",
  "image-to-pdf":"🖼️",
  "pdf-to-word":"📄",
  "pdf-to-jpg":"📷",
  "ocr-pdf":"👁️",
  "extract-text":"📝",
  "protect-pdf":"🔒",
  "metadata-pdf":"🧾",
  "pdf-info":"ℹ️",
  "unlock-pdf":"🔓",
  "pdf-to-excel":"📊"
};

const tools = [
  {slug:"merge-pdf", title:"Merge PDF", cat:"edit"},
  {slug:"split-pdf", title:"Split PDF", cat:"edit"},
  {slug:"compress-pdf", title:"Compress PDF", cat:"edit"},
  {slug:"rotate-pdf", title:"Rotate PDF", cat:"edit"},
  {slug:"watermark-pdf", title:"Watermark PDF", cat:"edit"},
  {slug:"delete-pages", title:"Delete Pages", cat:"edit"},
  {slug:"extract-pages", title:"Extract Pages", cat:"edit"},
  {slug:"reorder-pages", title:"Reorder Pages", cat:"edit"},
  {slug:"reverse-pages", title:"Reverse Pages", cat:"edit"},
  {slug:"duplicate-pages", title:"Duplicate Pages", cat:"edit"},
  {slug:"crop-pdf", title:"Crop PDF", cat:"edit"},
  {slug:"add-blank-pages", title:"Add Blank Pages", cat:"edit"},
  {slug:"page-number", title:"Page Number", cat:"edit"},

  {slug:"image-to-pdf", title:"Image to PDF", cat:"convert"},
  {slug:"pdf-to-word", title:"PDF to Word", cat:"convert"},
  {slug:"pdf-to-jpg", title:"PDF to JPG", cat:"convert"},
  {slug:"ocr-pdf", title:"OCR PDF", cat:"convert"},
  {slug:"extract-text", title:"Extract Text", cat:"convert"},

  {slug:"protect-pdf", title:"Protect PDF", cat:"security"},
  {slug:"metadata-pdf", title:"Metadata", cat:"security"},
  {slug:"pdf-info", title:"PDF Info", cat:"security"},
  {slug:"unlock-pdf", title:"Unlock PDF", cat:"security"},
  {slug:"pdf-to-excel", title:"PDF to Excel", cat:"convert"}
];

let currentCat = "all";

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const sidebar = document.getElementById("sidebar");
const backdrop = document.getElementById("backdrop");

function toggleMenu(){
  sidebar.classList.toggle("open");
  backdrop.classList.toggle("show");
}

function setActiveButtons(selector, value){
  document.querySelectorAll(selector).forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.cat === value);
  });
}

function render(){
  grid.innerHTML = "";
  const val = search.value.toLowerCase().trim();

  const filtered = tools.filter(t => {
    const catOk = currentCat === "all" || t.cat === currentCat;
    const searchOk = !val || t.title.toLowerCase().includes(val);
    return catOk && searchOk;
  });

  if (!filtered.length){
    grid.innerHTML = '<div class="empty-state">No tools found.</div>';
    return;
  }

  filtered.forEach(t => {
    const el = document.createElement("a");
    el.href = "/" + t.slug;
    el.className = "tool-card";

    el.innerHTML = `
      <div class="tool-ico">${icons[t.slug] || "📄"}</div>
      <div>
        <h3>${t.title}</h3>
        <p>Fast, secure and easy to use PDF tool for daily work.</p>
      </div>
    `;

    grid.appendChild(el);
  });
}

search.addEventListener("input", render);

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.onclick = () => {
    currentCat = btn.dataset.cat;
    setActiveButtons(".filter-btn", currentCat);
    setActiveButtons(".tabs button", currentCat);
    render();
  };
});

document.querySelectorAll(".tabs button").forEach(btn=>{
  btn.onclick = () => {
    const text = btn.dataset.cat;
    currentCat = text;
    setActiveButtons(".tabs button", currentCat);
    setActiveButtons(".filter-btn", currentCat);
    render();
  };
});

render();
</script>
</body>
</html>
