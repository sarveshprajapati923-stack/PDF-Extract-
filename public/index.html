<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF Tools Pro</title>

<style>
body{background:#0b1220;color:white;font-family:sans-serif;text-align:center}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{border:1px solid #00d1ff;padding:15px;border-radius:12px;cursor:pointer}
.card:hover{background:#00d1ff;color:black}
button{border:1px solid #00d1ff;background:none;color:#00d1ff;padding:12px;border-radius:10px}
</style>
</head>

<body>

<h1>🔥 PDF Tools Pro (16 Tools)</h1>

<div class="grid">
<div class="card" onclick="tool('merge')">Merge PDF</div>
<div class="card" onclick="tool('split')">Split PDF</div>
<div class="card" onclick="tool('compress')">Compress PDF</div>
<div class="card" onclick="tool('jpg-to-pdf')">JPG to PDF</div>
<div class="card" onclick="tool('rotate')">Rotate PDF</div>
<div class="card">PDF to JPG</div>
<div class="card">PDF to Word</div>
<div class="card">PDF to Excel</div>
<div class="card">PDF to PPT</div>
<div class="card">Unlock PDF</div>
<div class="card">Protect PDF</div>
<div class="card">Watermark</div>
<div class="card">Page Number</div>
<div class="card">Delete Pages</div>
<div class="card">Reorder Pages</div>
<div class="card">OCR Extract</div>
</div>

<input type="file" id="file" multiple><br><br>
<button onclick="run()">Run Tool</button>

<script>
let current="";

function tool(t){
 current=t;
 alert(t+" selected");
}

async function run(){
 let form=new FormData();
 let files=document.getElementById("file").files;

 if(current=="merge"||current=="jpg-to-pdf"){
   for(let f of files) form.append("files",f);
 }else{
   form.append("file",files[0]);
 }

 let res=await fetch("/"+current,{method:"POST",body:form});
 let blob=await res.blob();

 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download=current+".pdf";
 a.click();
}
</script>

</body>
</html>
