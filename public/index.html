<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WePDFHub - Free PDF Tools</title>

<style>
:root{
  --bg:#f7f9ff;
  --panel:#fff;
  --line:#d8e2f0;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#2563eb;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.wrap{max-width:1200px;margin:auto;padding:20px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.tool-card{
  padding:16px;
  border-radius:16px;
  border:1px solid var(--line);
  background:#fff;
  display:flex;
  gap:12px;
  transition:.2s;
}

.tool-card:hover{
  transform:translateY(-4px);
}

.tool-ico{
  width:45px;
  height:45px;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:#eef4ff;
  font-weight:bold;
  color:var(--primary);
}

h3{margin:0;font-size:16px}
p{margin:0;font-size:13px;color:var(--muted)}
</style>
</head>

<body>

<div class="wrap">
  <h2>All Tools</h2>
  <div id="toolsGrid" class="grid"></div>
</div>

<script>
// 🔥 SAME tools array (sync with backend)
const tools = [
  { slug:"merge-pdf", title:"Merge PDF", desc:"Combine PDFs" },
  { slug:"split-pdf", title:"Split PDF", desc:"Split pages" },
  { slug:"compress-pdf", title:"Compress PDF", desc:"Reduce size" },
  { slug:"rotate-pdf", title:"Rotate PDF", desc:"Rotate pages" },
  { slug:"watermark-pdf", title:"Watermark PDF", desc:"Add watermark" },
  { slug:"extract-text", title:"Extract Text", desc:"Read text" },
  { slug:"delete-pages", title:"Delete Pages", desc:"Remove pages" },
  { slug:"extract-pages", title:"Extract Pages", desc:"Keep pages" },
  { slug:"image-to-pdf", title:"Image to PDF", desc:"Convert images" },
  { slug:"page-number", title:"Page Number", desc:"Add numbers" },
  { slug:"reorder-pages", title:"Reorder Pages", desc:"Change order" },
  { slug:"reverse-pages", title:"Reverse Pages", desc:"Reverse pages" },
  { slug:"duplicate-pages", title:"Duplicate Pages", desc:"Duplicate pages" },
  { slug:"add-blank-pages", title:"Blank Pages", desc:"Add blank pages" },
  { slug:"crop-pdf", title:"Crop PDF", desc:"Crop pages" },
  { slug:"metadata-pdf", title:"Metadata", desc:"Edit metadata" },
  { slug:"pdf-info", title:"PDF Info", desc:"View info" },
  { slug:"pdf-to-word", title:"PDF to Word", desc:"Convert to DOCX" },
  { slug:"pdf-to-jpg", title:"PDF to JPG", desc:"Convert to images" },
  { slug:"ocr-pdf", title:"OCR PDF", desc:"Scan text" },
  { slug:"protect-pdf", title:"Protect PDF", desc:"Add password 🔒" } // ✅ added
];

// 🔥 Render dynamic grid
const grid = document.getElementById("toolsGrid");

tools.forEach(tool => {
  const el = document.createElement("a");
  el.href = "/" + tool.slug;
  el.className = "tool-card";

  el.innerHTML = `
    <div class="tool-ico">${tool.title[0]}</div>
    <div>
      <h3>${tool.title}</h3>
      <p>${tool.desc}</p>
    </div>
  `;

  grid.appendChild(el);
});
</script>

</body>
</html>
