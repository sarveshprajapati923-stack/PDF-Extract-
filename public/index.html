<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WePDFHub - Smart PDF Tools</title>

<style>
:root{
  --bg:#f7f9ff;
  --line:#d8e2f0;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#2563eb;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.wrap{max-width:1200px;margin:auto;padding:20px}

.top-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.search{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  outline:none;
}

.filter-btn{
  padding:10px 14px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fff;
  cursor:pointer;
  transition:.2s;
}

.filter-btn.active{
  background:var(--primary);
  color:#fff;
}

.filter-btn:hover{
  transform:scale(1.05);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.tool-card{
  padding:16px;
  border-radius:16px;
  border:1px solid var(--line);
  background:#fff;
  display:flex;
  gap:12px;
  text-decoration:none;
  color:inherit;
  transition:.2s;
}

.tool-card:hover{
  transform:translateY(-5px);
}

.tool-ico{
  width:46px;
  height:46px;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:#eef4ff;
  font-weight:700;
  color:var(--primary);
}
h3{margin:0;font-size:16px}
p{margin:0;font-size:13px;color:var(--muted)}
  h3{margin:0;font-size:16px}
p{margin:0;font-size:13px;color:var(--muted)}

/* yaha add karo */
.menu-btn{
  font-size:26px;
  cursor:pointer;
  position:fixed;
  left:15px;
  top:15px;
}

.sidebar{
  position:fixed;
  left:-250px;
  top:0;
  width:220px;
  height:100%;
  background:#fff;
  border-right:1px solid #ddd;
  transition:.3s;
  padding:20px;
}

.sidebar a{
  display:block;
  padding:10px;
  text-decoration:none;
  }
</style>
</head>

<body>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="sidebar" class="sidebar">
  <a href="#">All Tools</a>
  <a href="#">Workflows</a>
  <a href="#">Pricing</a>
  <a href="#">API</a>
</div>

<div class="wrap">

  <div class="top-bar">
    <div class="tabs">
    <button>All</button>
    <button>Organize PDF</button>
    <button>Convert PDF</button>
    <button>Security</button>
    <button>AI Tools</button>
    </div>
    <input id="search" class="search" placeholder="Search tools..." />

    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="edit">Edit</button>
    <button class="filter-btn" data-cat="convert">Convert</button>
    <button class="filter-btn" data-cat="security">Security</button>
  </div>

  <div id="grid" class="grid"></div>
</div>

<script>

/* ICON MAP */
const icons = {
  "merge-pdf":"⚡",
  "split-pdf":"✂️",
  "compress-pdf":"🗜️",
  "rotate-pdf":"🔄",
  "watermark-pdf":"💧",
  "delete-pages":"🗑️",
  "extract-pages":"📤",
  "reorder-pages":"🔀",
  "reverse-pages":"↩️",
  "duplicate-pages":"📑",
  "crop-pdf":"✂️",
  "add-blank-pages":"➕",
  "page-number":"🔢",
  "image-to-pdf":"🖼️",
  "pdf-to-word":"📄",
  "pdf-to-jpg":"📷",
  "ocr-pdf":"👁️",
  "extract-text":"📝",
  "protect-pdf":"🔒",
  "metadata-pdf":"🧾",
  "pdf-info":"ℹ️"
};

/* 21 TOOLS FINAL */
const tools = [
  {slug:"merge-pdf", title:"Merge PDF", cat:"edit"},
  {slug:"split-pdf", title:"Split PDF", cat:"edit"},
  {slug:"compress-pdf", title:"Compress PDF", cat:"edit"},
  {slug:"rotate-pdf", title:"Rotate PDF", cat:"edit"},
  {slug:"watermark-pdf", title:"Watermark PDF", cat:"edit"},
  {slug:"delete-pages", title:"Delete Pages", cat:"edit"},
  {slug:"extract-pages", title:"Extract Pages", cat:"edit"},
  {slug:"reorder-pages", title:"Reorder Pages", cat:"edit"},
  {slug:"reverse-pages", title:"Reverse Pages", cat:"edit"},
  {slug:"duplicate-pages", title:"Duplicate Pages", cat:"edit"},
  {slug:"crop-pdf", title:"Crop PDF", cat:"edit"},
  {slug:"add-blank-pages", title:"Add Blank Pages", cat:"edit"},
  {slug:"page-number", title:"Page Number", cat:"edit"},

  {slug:"image-to-pdf", title:"Image to PDF", cat:"convert"},
  {slug:"pdf-to-word", title:"PDF to Word", cat:"convert"},
  {slug:"pdf-to-jpg", title:"PDF to JPG", cat:"convert"},
  {slug:"ocr-pdf", title:"OCR PDF", cat:"convert"},
  {slug:"extract-text", title:"Extract Text", cat:"convert"},

  {slug:"protect-pdf", title:"Protect PDF", cat:"security"},
  {slug:"metadata-pdf", title:"Metadata", cat:"security"},
  {slug:"pdf-info", title:"PDF Info", cat:"security"}
];

let currentCat="all";
const grid=document.getElementById("grid");
const search=document.getElementById("search");

/* BACKEND HOOK (READY FOR REAL SaaS) */
async function callBackend(slug, file){
  const formData = new FormData();
  if(file) formData.append("file", file);

  const res = await fetch("/api/"+slug,{
    method:"POST",
    body:formData
  });

  return await res.json();
}

/* RENDER */
function render(){
  grid.innerHTML="";

  const val = search.value.toLowerCase();

  tools
  .filter(t => currentCat==="all" || t.cat===currentCat)
  .filter(t => t.title.toLowerCase().includes(val))
  .forEach(t => {

    const el=document.createElement("a");
    el.href="/"+t.slug;
    el.className="tool-card";

    el.innerHTML=`
      <div class="tool-ico">${icons[t.slug] || "📄"}</div>
      <div>
        <h3>${t.title}</h3>
        <p>${t.cat}</p>
      </div>
    `;

    grid.appendChild(el);
  });
}

/* EVENTS */
search.addEventListener("input",render);

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentCat=btn.dataset.cat;
    render();
  };
});

render();
function toggleMenu(){
  const sb = document.getElementById("sidebar");
  sb.style.left = sb.style.left === "0px" ? "-250px" : "0px";
  }

</script>

</body>
</html>
