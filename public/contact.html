<!DOCTYPE html>
<html>
<head>
<title>Contact - WePDFHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#f7f9ff;padding:20px}
form{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:12px}
input,textarea{
width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:8px
}
button{
padding:12px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;
cursor:pointer
}
</style>
</head>
<body>

<form>
<h2>Contact Us</h2>

<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Email" required>
<textarea rows="5" placeholder="Message"></textarea>

<button type="submit">Send Message</button>

</form>

</body>
</html>
