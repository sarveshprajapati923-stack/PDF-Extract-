<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - WePDFHub</title>
<style>
body{font-family:system-ui;margin:0;background:#f7f9ff;color:#0f172a}
.container{max-width:800px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
input,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #d8e2f0;
  border-radius:10px;
}
button{
  padding:12px 16px;
  border:1px solid #2563eb;
  background:#fff;
  color:#2563eb;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}
button:hover{background:#2563eb;color:#fff}
a{color:#2563eb;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Contact Us</h1>

    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Email" required>
      <textarea rows="5" placeholder="Message"></textarea>
      <button type="submit">Send Message</button>
    </form>

    <p>Email: support@wepdfhub.click</p>

    <p><a href="/">← Back to Home</a></p>
  </div>
</div>
</body>
</html>
